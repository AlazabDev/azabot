# ════════════════════════════════════════════════════════════
#  AzaBot — chat.alazab.com  (Nginx)
#  Routes:
#    /            → صفحة demo + embed script
#    /embed/      → azabot-embed.js (CDN)
#    /api/v2/chat → Supabase chat-v2 (proxy)
#    /health      → health check
# ════════════════════════════════════════════════════════════

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=40r/m;
limit_req_zone $binary_remote_addr zone=global:10m rate=100r/m;

# ── HTTP → HTTPS ─────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name chat.alazab.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.alazab.com;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/chat.alazab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.alazab.com/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self)" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Root: static files
    root /var/www/azabot;
    index index.html;

    # ── Health check ─────────────────────────────────────
    location = /health {
        access_log off;
        return 200 '{"status":"ok","service":"azabot"}';
        add_header Content-Type application/json;
    }

    # ── Embed script (با CORS مفتوح للجميع) ──────────────
    location /embed/ {
        limit_req zone=global burst=50 nodelay;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # ── API Proxy → Supabase chat-v2 ─────────────────────
    location /api/v2/chat {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass https://fjojyzvulhvqeitnaenv.supabase.co/functions/v1/chat-v2;
        proxy_http_version 1.1;
        proxy_set_header Host fjojyzvulhvqeitnaenv.supabase.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;

        # Security
        proxy_hide_header X-Powered-By;
    }

    # ── Static SPA ───────────────────────────────────────
    location / {
        limit_req zone=global burst=100 nodelay;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Cache assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Logs
    access_log /var/log/nginx/azabot_access.log;
    error_log  /var/log/nginx/azabot_error.log warn;
}
